<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HOYAJJU-runrun!Hoya!</title>
    <style>
        body { margin: 0; padding: 0; background-color: #222222; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; }
        canvas { background-color: #1a1a2e; box-shadow: 0 0 30px rgba(0,0,0,0.6); max-width: 100%; max-height: 100%; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = 1000;
canvas.height = 1000;

let score = 0;
let isGameOver = false;
let gameSpeed = 8;
let spawnTimer = 0;
let nextSpawnInterval = 80; 
const GROUND_Y = 800; 

let cloudTimer = 0;
let nextCloudInterval = 30; // 처음부터 빠르게 나오도록 조절
let glowTimer = 0;
  
let groundX = 0; 
let groundSpeed = 5; 

let jjuBlinkTimer = 0;
let isJjuBlinking = false;
let nextBlinkInterval = 60; 

// ========================================================
// ★ [복구 완료] 반짝이며 흘러가는 별 시스템 ★
// ========================================================
let stars = []; 
let starSpeed = 1.5; // 배경에 맞게 은은하게 흘러가는 속도

class Star {
    constructor() {
        this.x = Math.random() * canvas.width; 
        this.y = Math.random() * 550;           
        this.size = 1 + Math.random() * 2;    
        this.originalSize = this.size;          
        this.alpha = 0.3 + Math.random() * 0.7; 
    }
    update() {
        if (!isGameOver) {
            this.x -= starSpeed;
            if (this.x + this.size < 0) {
                this.x = canvas.width;
                this.y = Math.random() * 550; 
            }
        }
    }
    draw(time) {
        let currentSize = this.originalSize + Math.sin(time + this.x) * 1.0;
        if (currentSize < 0.5) currentSize = 0.5;
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`; 
        ctx.beginPath();
        ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
        ctx.fill();
    }
}

const IMAGES_SRC = {
    bg: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/bg.png?raw=true', 
    character: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/hoya_run.png?raw=true', 
    ground: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/ground_bg.png?raw=true',       
    moon: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/jju.png?raw=true',           
    moon_blink: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/jju_blink.png?raw=true', 
    cloud: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/cloud_1.png?raw=true',         
    rock: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/ob_rock.png?raw=true',           
    drawer: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/ob_pot.png?raw=true',       
    pot: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/ob_mush.png?raw=true',             
    flower: 'https://github.com/tlrouvee-creator/hoyajju_hoya-run/blob/main/ob_flower.png?raw=true'        
};

const images = {};
const imagesLoaded = {};

try {
    Object.keys(IMAGES_SRC).forEach(key => {
        imagesLoaded[key] = false;
        images[key] = new Image();
        images[key].src = IMAGES_SRC[key];
        images[key].onload = () => { imagesLoaded[key] = true; };
        images[key].onerror = () => { imagesLoaded[key] = false; };
    });
} catch(e) {}

const character = {
    x: 50,               
    y: GROUND_Y - 327,    
    width: 300,           
    height: 327,          
    gravity: 1.0,         
    jumpForce: -24,     
    velocityY: 0,
    isJumping: false,
    frameCount: 6,        
    currentFrame: 0,    
    animTimer: 0,       
    animSpeed: 4.5 ,     
    
    draw() {
        if (imagesLoaded['character'] && images.character && images.character.complete && images.character.naturalWidth > 0) {
            try {
                let frameWidth = images.character.naturalWidth / this.frameCount;
                let frameHeight = images.character.naturalHeight;
                let sourceX = this.isJumping ? 0 : this.currentFrame * frameWidth;
                ctx.drawImage(images.character, sourceX, 0, frameWidth, frameHeight, this.x, this.y, this.width, this.height);
                return;
            } catch (e) {}
        }
        ctx.fillStyle = '#ff007f'; 
        ctx.fillRect(this.x, this.y, this.width, this.height);
    },
    update() {
        this.velocityY += this.gravity;
        this.y += this.velocityY;
        if (this.y > GROUND_Y - this.height) {
            this.y = GROUND_Y - this.height;
            this.velocityY = 0;
            this.isJumping = false;
        }
        if (!this.isJumping && !isGameOver) {
            this.animTimer++;
            if (this.animTimer >= this.animSpeed) {
                this.currentFrame = (this.currentFrame + 1) % this.frameCount;
                this.animTimer = 0;
            }
        }
    },
    jump() {
        if (!this.isJumping) {
            this.velocityY = this.jumpForce;
            this.isJumping = true;
        }
    }
};

class Cloud {
    constructor() {
        this.x = canvas.width + Math.random() * 300; 
        this.y = 50 + Math.random() * 400;           

        let cloudScale = 0.5 + Math.random() * 2.0; 
        this.width = 180 * cloudScale;   
        this.height = 127 * cloudScale;  

        this.opacity = 0.15 + Math.random() * 0.4; 
        this.speed = gameSpeed * 0.3;
    }
    update() { this.x -= this.speed; }
    draw() {
        ctx.save();          
        ctx.globalAlpha = this.opacity; 

        if (imagesLoaded['cloud'] && images.cloud && images.cloud.complete) {
            try {
                ctx.drawImage(images.cloud, this.x, this.y, this.width, this.height);
                ctx.restore(); 
                return;
            } catch(e){}
        }
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.restore();
    }
}

const OBSTACLE_TYPES = ['rock', 'drawer', 'pot', 'flower'];

class Obstacle {
    constructor() {
        this.x = canvas.width;
        this.type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
        if (this.type === 'rock') { this.width = 80; this.height = 66; }
        else if (this.type === 'drawer') { this.width = 70; this.height = 136; }
        else if (this.type === 'pot') { this.width = 60; this.height = 69; }
        else if (this.type === 'flower') { this.width = 50; this.height = 77; }
        this.y = GROUND_Y - this.height; 
    }
    update() { this.x -= gameSpeed; }
    draw() {
        ctx.save(); 
        ctx.shadowBlur = 15;                  
        ctx.shadowColor = "rgba(255, 0, 0, 1)"; 

        if (imagesLoaded[this.type] && images[this.type] && images[this.type].complete) {
            try {
                ctx.drawImage(images[this.type], this.x, this.y, this.width, this.height);
                ctx.restore(); 
                return;
            } catch(e){}
        }
        if (this.type === 'rock') ctx.fillStyle = '#707075';
        else if (this.type === 'drawer') ctx.fillStyle = '#8b5a2b';
        else if (this.type === 'pot') ctx.fillStyle = '#d2691e';
        else if (this.type === 'flower') ctx.fillStyle = '#ffa500';
        ctx.fillRect(this.x, this.y, this.width, this.height);
        ctx.restore();
    }
}

let obstacles = [];
let clouds = [];

function checkCollision(char, obs) {
    let charBoxX = char.x + 70;
    let charBoxY = char.y + 80;
    let charBoxW = 120;
    let charBoxH = 220; // 억까 방지 발바닥 히트박스 최적화

    let obsBoxX = obs.x + 10;
    let obsBoxY = obs.y + 10;
    let obsBoxW = obs.width - 20;
    let obsBoxH = obs.height - 20;

    return charBoxX < obsBoxX + obsBoxW &&
           charBoxX + charBoxW > obsBoxX &&
           charBoxY < obsBoxY + obsBoxH &&
           charBoxY + charBoxH > obsBoxY;
}

function handleJump(e) {
    if (e) e.preventDefault();
    if (isGameOver) { resetGame(); } else { character.jump(); }
}

window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleJump(e); });
canvas.addEventListener('touchstart', handleJump, { passive: false });

function resetGame() {
    obstacles = []; clouds = []; score = 0; gameSpeed = 8; isGameOver = false; spawnTimer = 0; nextSpawnInterval = 80;
    cloudTimer = 0; nextCloudInterval = 30; 
    jjuBlinkTimer = 0; isJjuBlinking = false; nextBlinkInterval = 60; 
    glowTimer = 0; groundX = 0; groundSpeed = 5;

    // ★ 시작할 때 하늘에 별 40개 생성
    stars = [];
    for(let i = 0; i < 40; i++) {
        stars.push(new Star());
    }

    // 시작하자마자 구름 3개 미리 랜덤 배치
    for(let i = 0; i < 3; i++) {
        let presetCloud = new Cloud();
        presetCloud.x = 100 + Math.random() * 700; 
        clouds.push(presetCloud);
    }

    character.y = GROUND_Y - character.height;
    animate();
}

function calculateNextInterval() {
    let baseMin = Math.max(45, 85 - Math.floor(gameSpeed * 3));
    let baseMax = Math.max(90, 160 - Math.floor(gameSpeed * 4));
    return baseMin + Math.floor(Math.random() * (baseMax - baseMin));
}

function animate() {
    if (isGameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff'; ctx.font = 'bold 64px sans-serif'; ctx.fillText('GAME OVER', canvas.width/2 - 190, canvas.height/2 - 20);
        ctx.fillStyle = '#ff007f'; ctx.font = '32px sans-serif'; ctx.fillText('화면을 터치하면 다시 시작!', canvas.width/2 - 210, canvas.height/2 + 60);
        return;
    }

    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  
    // 1. 1000x1000 통짜 밤하늘 배경 이미지 최하단 드로잉
    if (imagesLoaded['bg'] && images.bg && images.bg.complete) {
        try {
            ctx.drawImage(images.bg, 0, 0, 1000, 1000); 
        } catch(e) {}
    } else {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 2. 반짝이는 별 실시간 연산 및 렌더링
    stars.forEach(star => {
        star.update(); 
        star.draw(glowTimer * 8); 
    });

    // 3. 구름 스폰 및 연산 (템포 버프)
    cloudTimer += 0.7; 
    if (cloudTimer >= nextCloudInterval) {
        clouds.push(new Cloud());
        cloudTimer = 0;
        nextCloudInterval = 60 + Math.floor(Math.random() * 80); 
    }

    clouds.forEach((cloud, index) => {
        cloud.update(); cloud.draw();
        if (cloud.x + cloud.width < 0) clouds.splice(index, 1);
    });

    // 4. 움직이는 풀밭 바닥 레이어 무한 스크롤
    if (imagesLoaded['ground'] && images.ground && images.ground.complete) {
        try {
            if (!isGameOver) {
                groundX -= groundSpeed;
                if (groundX <= -1000) {
                    groundX = 0;
                }
            }
            ctx.drawImage(images.ground, groundX, 604, 1000, 440); 
            ctx.drawImage(images.ground, groundX + 1000, 604, 1000, 440); 
        } catch(e) {
            ctx.strokeStyle = '#444444'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();
        }
    } else {
        ctx.strokeStyle = '#444444'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();
    }
  
    // 5. 쮸 실시간 눈 깜빡임 타이머 연산
    jjuBlinkTimer++;
    if (!isJjuBlinking && jjuBlinkTimer >= nextBlinkInterval) {
        isJjuBlinking = true;
        jjuBlinkTimer = 0;
    } else if (isJjuBlinking && jjuBlinkTimer >= 9) { 
        isJjuBlinking = false;
        jjuBlinkTimer = 0;
        nextBlinkInterval = 50 + Math.floor(Math.random() * 60); 
    }

    // 6. 둥실둥실 달 (쮸 얼굴 후광 효과)
    ctx.save(); 
    glowTimer += 0.05; 
    ctx.shadowBlur = 90 + Math.sin(glowTimer) * 50; 
    ctx.shadowColor = "rgba(255, 235, 170, 0.85)";

    let jjuY = 80 + Math.sin(glowTimer * 0.8) * 15; 

    if (isJjuBlinking && imagesLoaded['moon_blink'] && images.moon_blink.complete) {
        ctx.drawImage(images.moon_blink, canvas.width - 450, jjuY, 350, 350);
    } else if (imagesLoaded['moon'] && images.moon && images.moon.complete) {
        ctx.drawImage(images.moon, canvas.width - 450, jjuY, 350, 350);
    } else {
        ctx.fillStyle = '#fefdca'; 
        ctx.fillRect(canvas.width - 450, jjuY, 350, 350);
    }
    ctx.restore(); 

    // 7. 점수판 및 호야 드로잉
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 36px sans-serif'; ctx.fillText(`SCORE : ${score}`, 50, 65);

    character.update();
    character.draw();

    // 8. 장애물 리젠 및 레드 아우라 체크
    spawnTimer++;
    if (spawnTimer >= nextSpawnInterval) {
        obstacles.push(new Obstacle());
        spawnTimer = 0;
        nextSpawnInterval = calculateNextInterval();
    }

    obstacles.forEach((obs, index) => {
        obs.update(); obs.draw();
        if (obs.x + obs.width < 0) {
            obstacles.splice(index, 1); score += 10;
            if (score % 50 === 0 && score > 0) { gameSpeed += 0.8; }
        }
        if (checkCollision(character, obs)) { isGameOver = true; }
    });
}

// 첫 게임 실행을 위해 초기화 작동
resetGame();
</script>

</body>
</html>
